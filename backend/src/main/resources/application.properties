# Server
server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5433/sea_credit
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:dev-password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

app.jwt.secret=${JWT_SECRET:dev-secret-key-placeholder-at-least-32-chars}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

app.file.upload-dir=./uploads
app.file.max-file-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.cors.allowed-origins=http://localhost:3000

app.cba.api.url=https://www.cbar.az/currencies
app.cba.api.enabled=true

app.akb.api.url=https://api.akb.az
app.akb.api.key=${AKB_API_KEY:dev-key-placeholder}
app.akb.api.enabled=false
app.akb.api.simulation=true

brevo.api.key=${BREVO_API_KEY:}
brevo.email.from=info@savelya.com
brevo.sender.name=Sea-Credit
brevo.api.url=https://api.brevo.com/v3/smtp/email

logging.level.com.seacredit=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
